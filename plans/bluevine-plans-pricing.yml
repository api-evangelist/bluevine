name: Bluevine Plans and Pricing
description: Pricing plans for Bluevine business banking and lending products
url: https://www.bluevine.com/business-checking/
created: 2026-06-13
modified: 2026-06-13

plans:

  - name: Standard
    description: Free business checking with no monthly fees and competitive APY on qualifying balances
    url: https://www.bluevine.com/business-checking/
    monthlyFee: 0
    currency: USD
    features:
      - No monthly fees
      - 1.3% APY on balances up to $250,000 (with qualifying activity)
      - Unlimited transactions
      - Free standard ACH transfers
      - Mobile check deposit
      - Bill pay (ACH, check, domestic wire, international wire)
      - Automated accounts payable
      - Professional invoicing
      - FDIC insurance up to $3 million per depositor
      - No minimum balance requirement
      - Multiple sub-accounts
      - Physical and virtual debit cards
      - Team access with dedicated logins
    qualifyingActivity: Spend $500/month with debit card OR receive $2,500/month in payments to earn APY

  - name: Plus
    description: Enhanced business checking with higher APY and premium features
    url: https://www.bluevine.com/business-checking/
    monthlyFee: 30
    currency: USD
    monthlyFeeWaivable: true
    features:
      - 1.75% APY on balances up to $250,000
      - All Standard plan features
      - Priority customer support
      - Enhanced payment processing discounts

  - name: Premier
    description: Premium business checking with highest APY for high-volume businesses
    url: https://www.bluevine.com/business-checking/premier
    monthlyFee: 95
    currency: USD
    monthlyFeeWaivable: true
    features:
      - 3.0% APY on all balances
      - All Plus plan features
      - Dedicated relationship support
      - Advanced cash flow management tools

lending:

  - name: Line of Credit
    description: Revolving business line of credit for working capital needs
    url: https://www.bluevine.com/line-of-credit/
    maxAmount: 250000
    currency: USD
    minMonthlyRevenue: 10000
    minAnnualRevenue: 120000
    minFICO: 625
    minTimeInBusiness: 12
    minTimeInBusinessUnit: months
    drawFeeACH: 0
    drawFeeWire: 15
    fundingSpeed: As fast as 24 hours; instant with Bluevine Business Checking
    eligibleBusinessTypes:
      - Corporation
      - LLC
    ineligibleStates:
      - Nevada
      - North Dakota
      - South Dakota
    issuedBy: Celtic Bank

  - name: Term Loan
    description: Small business term loans through partner lenders
    url: https://www.bluevine.com/
    maxAmount: 500000
    currency: USD
    provider: Partner lenders
