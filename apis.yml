apis:

  - aid: bluevine:business-checking
    name: Bluevine Business Checking
    description: Fully integrated business checking account with no monthly fees on the standard tier, high-yield APY, unlimited transactions, bill pay, automated accounts payable, professional invoicing, and FDIC insurance up to $3 million through a sweep network. The account connects to accounting and payment software through the Plaid open-banking aggregator and a native QuickBooks Online integration; there is no first-party public API for the account itself.
    humanURL: https://www.bluevine.com/business-checking/
