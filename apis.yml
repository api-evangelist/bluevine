aid: bluevine
name: Bluevine
description: Bluevine is a small business banking and lending platform offering business checking accounts, lines of credit, bill pay, invoicing, and cash flow management tools. The platform integrates with QuickBooks Online, accounting software, and payment processors via Plaid open banking, providing small businesses with FDIC-insured deposits up to $3 million, competitive APY, and fast access to revolving credit up to $250,000.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bluevine/refs/heads/main/apis.yml
