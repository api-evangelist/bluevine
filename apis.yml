apis:

  - aid: bluevine:business-checking
    name: Bluevine Business Checking
    description: Fully integrated business checking account with no monthly fees on standard tier, high-yield APY, unlimited transactions, bill pay, automated accounts payable, professional invoicing, and FDIC insurance up to $3 million. Connects with accounting software via Plaid and native QuickBooks Online integration.
    humanURL: https://www.bluevine.com/business-checking/
    baseURL: https://app.bluevine.com/
    tags:
      - Business Checking
      - Banking
      - Bill Pay
      - Invoicing
      - ACH
      - Wire Transfer
    properties:
      - type: Documentation
        url: https://www.bluevine.com/guides/checking/connecting-financial-apps
      - type: Plans
        url: https://raw.githubusercontent.com/api-evangelist/bluevine/refs/heads/main/plans/bluevine-plans-pricing.yml

  - aid: bluevine:line-of-credit
    name: Bluevine Line of Credit
    description: Revolving business line of credit up to $250,000 issued by Celtic Bank, with no maintenance fees, fee-free ACH draws, and funding in as fast as 24 hours. Requires 625+ personal FICO, 12+ months in business, and $120,000+ annual revenue. Instant funding available for Bluevine Business Checking account holders.
    humanURL: https://www.bluevine.com/line-of-credit/
    baseURL: https://app.bluevine.com/
    tags:
      - Line of Credit
      - Business Lending
      - Working Capital
      - Revolving Credit
    properties:
      - type: Documentation
        url: https://www.bluevine.com/guides/line-of-credit/how-to-apply
