  - aid: bluevine:line-of-credit
    name: Bluevine Line of Credit
    description: Revolving business line of credit up to $250,000 issued by Celtic Bank, with no maintenance fees, fee-free ACH draws, and funding in as fast as 24 hours. Qualification requires a 625+ personal FICO score, 12+ months in business, and $120,000+ annual revenue, with instant funding available for Bluevine Business Checking account holders. Application and servicing are dashboard-only; there is no documented public lending API.
    humanURL: https://www.bluevine.com/line-of-credit/
    baseURL: https://app.bluevine.com/
    tags:
