        url: https://www.bluevine.com/line-of-credit/
      - type: Plans
        url: https://raw.githubusercontent.com/api-evangelist/bluevine/refs/heads/main/plans/bluevine-plans-pricing.yml

  - aid: bluevine:connected-apps
    name: Bluevine Connected Apps & Financial Integrations
    description: Bluevine's programmatic connectivity surface for third parties. Rather than a first-party public API, Bluevine exposes account and transaction data to external software through the Plaid open-banking aggregator (bank feeds carried with no additional Bluevine fee) plus a set of native app integrations that sync bills, transactions, categories, and payees. Documented integrations include QuickBooks Online, Xero, Wave, Expensify, Stripe, Square, Gusto, Cash App, and Venmo. Data access for aggregators is credential/OAuth-driven through Plaid (Finicity/Mastercard coverage also reported); Bluevine publishes no downloadable OpenAPI, Swagger, or Postman collection and no partner-facing FDX developer interface.
    humanURL: https://www.bluevine.com/help-center/sending-payments/connecting-financial-apps
